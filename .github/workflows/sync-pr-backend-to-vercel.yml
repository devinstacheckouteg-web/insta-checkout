# Sync Railway PR backend URL to Vercel preview deployments
#
# Runs when a PR is opened or updated (from the PR branch - no merge required).
# 1. Waits for Railway to deploy and post the backend URL in a comment
# 2. Extracts the backend URL from Railway's PR comment
# 3. Sets NEXT_PUBLIC_BACKEND_URL for that branch in Vercel
# 4. Triggers a Vercel redeploy so the preview uses the PR backend
#
# Prerequisites:
# - Railway PR environments enabled (Project Settings → Environments)
# - Backend service has a Railway domain in the base environment
# - Vercel project(s) connected to this repo
#
# Required secrets:
# - VERCEL_TOKEN: Vercel API token (create at vercel.com/account/tokens)
#
# Optional (for teams):
# - VERCEL_TEAM_ID: Your Vercel team ID (omit for personal account)
#
# Configure Vercel project(s):
# - VERCEL_PROJECT_IDS: Repo variable, comma-separated (e.g. "insta-checkout-landing,insta-checkout-checkout")
name: Sync PR Backend to Vercel

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Wait for Railway deployment and get backend URL
        id: railway
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const maxAttempts = 20;
            const delayMs = 30000;

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
              });

              for (const comment of comments) {
                if (comment.user?.login?.includes('railway') && comment.body) {
                  const match = comment.body.match(/https:\/\/[a-zA-Z0-9.-]+\.(up\.)?railway\.app/);
                  if (match) {
                    const url = match[0].replace(/\/$/, '');
                    core.setOutput('backend_url', url);
                    core.info(`Found Railway URL: ${url}`);
                    return;
                  }
                }
              }

              if (attempt < maxAttempts) {
                core.info(`Attempt ${attempt}/${maxAttempts}: Railway comment not found yet, waiting ${delayMs/1000}s...`);
                await new Promise(r => setTimeout(r, delayMs));
              }
            }

            core.setOutput('backend_url', '');
            core.warning('Railway deployment URL not found in PR comments after waiting.');

      - name: Set Vercel env and redeploy
        id: vercel
        if: steps.railway.outputs.backend_url != ''
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          BACKEND_URL: ${{ steps.railway.outputs.backend_url }}
          BRANCH: ${{ github.head_ref }}
        run: |
          set -e
          PROJECT_IDS="${{ vars.VERCEL_PROJECT_IDS || 'insta-checkout-landing' }}"
          DEPLOY_LINKS=""
          for PROJECT in ${PROJECT_IDS//,/ }; do
            PROJECT=$(echo "$PROJECT" | xargs)
            [ -z "$PROJECT" ] && continue
            echo "Configuring project: $PROJECT"

            # Create or update env var for this branch (upsert)
            ENV_URL="https://api.vercel.com/v10/projects/${PROJECT}/env?upsert=true"
            [ -n "$VERCEL_TEAM_ID" ] && ENV_URL="${ENV_URL}&teamId=${VERCEL_TEAM_ID}"
            curl -s -X POST "$ENV_URL" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{
                \"key\": \"NEXT_PUBLIC_BACKEND_URL\",
                \"value\": \"$BACKEND_URL\",
                \"type\": \"plain\",
                \"target\": [\"preview\"],
                \"gitBranch\": \"$BRANCH\"
              }" | jq . || true

            # Trigger redeploy for this branch
            REPO_OWNER="${{ github.repository_owner }}"
            REPO_NAME="${{ github.event.repository.name }}"
            DEPLOY_URL="https://api.vercel.com/v13/deployments"
            [ -n "$VERCEL_TEAM_ID" ] && DEPLOY_URL="${DEPLOY_URL}?teamId=${VERCEL_TEAM_ID}"
            DEPLOY_BODY=$(curl -s -X POST "$DEPLOY_URL" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{
                \"name\": \"$PROJECT\",
                \"gitSource\": {
                  \"type\": \"github\",
                  \"ref\": \"$BRANCH\",
                  \"org\": \"$REPO_OWNER\",
                  \"repo\": \"$REPO_NAME\"
                }
              }")
            PREVIEW_URL=$(echo "$DEPLOY_BODY" | jq -r '.url // empty')
            if [ -n "$PREVIEW_URL" ]; then
              FULL_URL="https://${PREVIEW_URL}"
              DEPLOY_LINKS="${DEPLOY_LINKS}${PROJECT}::${FULL_URL}"$'\n'
            fi
            echo "$DEPLOY_BODY" | jq -r '.url // .error.message // .' || echo "$DEPLOY_BODY"
          done
          echo "deploy_links<<EOF" >> $GITHUB_OUTPUT
          echo -e "$DEPLOY_LINKS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment deployment links on PR
        if: steps.railway.outputs.backend_url != '' && steps.vercel.outputs.deploy_links != ''
        uses: actions/github-script@v7
        with:
          script: |
            const deployLinks = `${{ steps.vercel.outputs.deploy_links }}`.trim();
            if (!deployLinks) return;

            const rows = deployLinks.split('\n').filter(Boolean).map(line => {
              const [project, url] = line.split('::');
              return `| ${project} | [Preview](${url}) |`;
            }).join('\n');

            const body = `## Vercel preview (with Railway backend)

            Backend: \`${{ steps.railway.outputs.backend_url }}\`

            | Project | Link |
            | :--- | :--- |
            ${rows}
            `;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const marker = 'Vercel preview (with Railway backend)';
            const existing = comments.find(c => c.user?.type === 'Bot' && c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }
